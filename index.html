<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body class= "bg-black"style="font-family: 'Press Start 2P', cursive;"  class="flex flex-col justify-center items-center"  >

<header>

    <!-- DIV NAVBAR -->
<div class=" flex justify-between items-center ">

<p class="btn again px-2.5 py-3 md:py-5 md:px-5 text-[10px] md:text-2xl bg-white inline">Again!</p>
<p class=" between text-[8px] text-white md:text-3xl">(between 1 and 20)</p>

</div>

</header>

<!-- INFO -->
<main class=" flex flex-col gap-y-10 justify-center items-center mt-5  md:gap-y-20">

    <h1 class=" text-[17px] md:text-5xl text-white">Guess My Number</h1>

    <!-- IMAGE -->
    <div class="bg-white h-5 w-full flex justify-center relative">

        <div class="number fa-solid fa-question text-6xl text-black bg-white px-10.5 py-5 absolute -top-8 md:text-8xl md:px-14 md:py-10 md:-top-18"></div>

    </div>
</main>

<main class="text-white text-2xl flex flex-col gap-y-6 mt-20 md:flex-row md:justify-around md:items-center">
<div class="text-white text-2xl flex flex-col gap-y-4 md:flex-col md:justify-center items-center md:gap-y-8">

    <input type="number" class="guess border-2 border-white h-25 text-white w-100 flex text-center text-3xl">
    <button class="check text-2xl bg-white md:inline px-5 py-3 text-black w-100  md:text-4xl md:px-24">Check!</button>

    </div>

<div class=" flex flex-col md:gap-y-7 text-[15px] md:text-4xl gap-y-7">
    <p class="message">Start guessing...</p>
    
    <p class="label-score">♏♏Score:<span class="score">5</span> </p>
    <p class="label-highscore">🔥🔥HighScore: <span class="highscore">0</span> </p>

    </div>
</main>

<script src="script.js"></script>
</body>
</html>
